<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>仕净管理系统 v5.0</title>
<link rel="icon" href="logo.jpg" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --brand-primary: #1a3a8a;       /* 深海军蓝 */
    --brand-primary-dark: #0f2456;
    --brand-accent: #2e5dd6;
    --brand-silver: #c8d0db;
    --brand-silver-light: #e8ecf3;
    --brand-bg: #f4f6fb;
    --brand-text: #1d2841;
    --brand-text-soft: #5a6478;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--brand-bg); color: var(--brand-text); }
  .hidden { display: none !important; }

  /* 登录页 */
  /* 登录页（高端医美品牌美学）*/
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f2456 0%, #1a3a8a 50%, #2e5dd6 100%);
    position: relative; overflow: hidden; animation: fadeIn 1.2s ease-out;
  }
  .login-wrap::before { content: ''; position: absolute; inset: 0; background:
    radial-gradient(circle at 15% 25%, rgba(255,255,255,.12), transparent 35%),
    radial-gradient(circle at 85% 75%, rgba(230,119,0,.15), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(46,93,214,.2), transparent 50%);
    pointer-events: none; animation: pulseGlow 8s ease-in-out infinite alternate;
  }
  .login-wrap::after { content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 100%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,.03) 50%, transparent 70%);
    animation: shimmer 15s linear infinite; pointer-events: none;
  }
  .login-card { position: relative; background: rgba(255,255,255,.98); padding: 48px 42px; border-radius: 24px;
    box-shadow: 0 40px 100px rgba(15,36,86,.5), 0 0 0 1px rgba(200,208,219,.6),
      inset 0 1px 0 rgba(255,255,255,.8);
    width: 480px; z-index: 1; backdrop-filter: blur(10px);
    transform: translateY(0) rotateX(0); transition: transform .4s cubic-bezier(.4,0,.2,1);
    animation: cardEntrance .8s cubic-bezier(.4,0,.2,1) forwards;
  }
  .login-card:hover { transform: translateY(-4px) rotateX(2deg); box-shadow: 0 50px 120px rgba(15,36,86,.6); }
  .brand-block { text-align: center; margin-bottom: 36px; animation: slideDown .6s ease-out .2s both; }
  .brand-logo { width: 96px; height: 96px; object-fit: contain; margin-bottom: 18px;
    filter: drop-shadow(0 8px 20px rgba(26,58,138,.4));
    animation: logoFloat 3s ease-in-out infinite;
    transition: transform .3s ease;
  }
  .brand-logo:hover { transform: scale(1.08) rotate(3deg); }
  .login-card h1 { font-size: 26px; color: var(--brand-primary); letter-spacing: 4px; margin-bottom: 8px;
    font-weight: 800; font-family: 'Playfair Display', 'Georgia', serif; text-shadow: 0 1px 2px rgba(26,58,138,.1);
    animation: slideDown .6s ease-out .3s both;
  }
  .login-card .subtitle { color: var(--brand-text-soft); font-size: 13px; letter-spacing: 6px; font-weight: 500;
    margin-top: 4px; opacity: .85; animation: slideDown .6s ease-out .4s both;
  }
  .role-tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px;
    animation: slideDown .6s ease-out .5s both;
  }
  .role-tab { padding: 14px; border: 2px solid var(--brand-silver); border-radius: 12px; text-align: center;
    cursor: pointer; transition: all .3s cubic-bezier(.4,0,.2,1); font-size: 14px;
    background: linear-gradient(135deg, rgba(255,255,255,.9), rgba(248,250,252,.95));
    color: var(--brand-text-soft); font-weight: 500; position: relative; overflow: hidden;
  }
  .role-tab::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,
    transparent, rgba(255,255,255,.3)); opacity: 0; transition: opacity .3s; }
  .role-tab:hover::before { opacity: 1; }
  .role-tab:hover { border-color: var(--brand-accent); color: var(--brand-primary);
    transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,58,138,.15);
  }
  .role-tab.active { border-color: var(--brand-primary); background: linear-gradient(135deg,
    var(--brand-primary), var(--brand-accent));
    color: #fff; font-weight: 700; box-shadow: 0 8px 20px rgba(26,58,138,.35);
    transform: translateY(-3px);
  }
  .form-group { margin-bottom: 18px; animation: slideDown .6s ease-out calc(.6s + var(--i,0)*.05s) both; }
  .form-group label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--brand-text-soft);
    font-weight: 600; letter-spacing: .5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px 16px; border: 2px solid var(--brand-silver); border-radius: 10px;
    font-size: 15px; outline: none; transition: all .3s cubic-bezier(.4,0,.2,1);
    background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(252,254,255,.98));
    font-family: 'Lato', -apple-system, sans-serif;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(26,58,138,.15),
      0 2px 8px rgba(26,58,138,.1);
    background: #fff; transform: translateY(-1px);
  }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
    color: #fff; font-size: 16px; cursor: pointer; transition: all .3s cubic-bezier(.4,0,.2,1);
    letter-spacing: 2px; font-weight: 700; font-family: 'Lato', sans-serif;
    position: relative; overflow: hidden; animation: slideUp .6s ease-out .7s both;
  }
  .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    transition: left .5s;
  }
  .btn:hover::before { left: 100%; }
  .btn:hover { box-shadow: 0 8px 20px rgba(26,58,138,.45); transform: translateY(-2px);
    letter-spacing: 3px;
  }
  .btn:active { transform: translateY(0) scale(.98); }
  .btn-sm { width: auto; padding: 9px 18px; font-size: 14px; letter-spacing: 1px; border-radius: 8px; }
  .btn-danger { background: linear-gradient(135deg, #c0392b, #e74c3c); }
  .btn-success { background: linear-gradient(135deg, #1e7e34, #28a745); }
  .btn-warning { background: linear-gradient(135deg, #c87f0a, #e6a23c); }
  
  /* 动画定义 */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cardEntrance { from { opacity: 0; transform: translateY(40px) rotateX(10deg); }
    to { opacity: 1; transform: translateY(0) rotateX(0); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes logoFloat { 0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); } }
  @keyframes pulseGlow { 0% { opacity: .6; } 100% { opacity: .9; } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .role-tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
  .role-tab { padding: 12px; border: 1.5px solid var(--brand-silver); border-radius: 8px; text-align: center;
    cursor: pointer; transition: all .25s; font-size: 13px; background: #fff; color: var(--brand-text-soft);
  }
  .role-tab:hover { border-color: var(--brand-accent); color: var(--brand-primary); }
  .role-tab.active { border-color: var(--brand-primary); background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
    color: #fff; font-weight: 600; box-shadow: 0 4px 12px rgba(26,58,138,.3);
  }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--brand-text-soft); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--brand-silver); border-radius: 6px;
    font-size: 14px; outline: none; transition: border .2s, box-shadow .2s; background: #fff;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(26,58,138,.1);
  }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 6px;
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
    color: #fff; font-size: 15px; cursor: pointer; transition: all .2s; letter-spacing: 1px; font-weight: 500;
  }
  .btn:hover { box-shadow: 0 6px 16px rgba(26,58,138,.35); transform: translateY(-1px); }
  .btn-sm { width: auto; padding: 7px 16px; font-size: 13px; letter-spacing: 0; }
  .btn-danger { background: linear-gradient(135deg, #c0392b, #e74c3c); }
  .btn-success { background: linear-gradient(135deg, #1e7e34, #28a745); }
  .btn-warning { background: linear-gradient(135deg, #c87f0a, #e6a23c); }

  /* 主体框架 */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 230px; background: linear-gradient(180deg, var(--brand-primary-dark), var(--brand-primary));
    color: #fff; padding: 0 0 24px;
    box-shadow: 2px 0 12px rgba(15,36,86,.15);
  }
  .sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 12px;
  }
  .sidebar-brand img { width: 42px; height: 42px; object-fit: contain;
    background: rgba(255,255,255,.95); border-radius: 6px; padding: 3px;
  }
  .brand-name { font-size: 14px; font-weight: 600; letter-spacing: 1px; }
  .brand-role { font-size: 11px; opacity: .7; margin-top: 2px; letter-spacing: 2px; }
  .menu-item { padding: 13px 22px; cursor: pointer; transition: all .2s; font-size: 13.5px;
    border-left: 3px solid transparent; color: rgba(255,255,255,.85);
  }
  .menu-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .menu-item.active { background: rgba(255,255,255,.1); border-left-color: var(--brand-silver-light); color: #fff; font-weight: 500; }
  .main { flex: 1; padding: 22px; overflow-x: auto; }
  .topbar { display: flex; justify-content: space-between; align-items: center; background: #fff;
    padding: 14px 20px; border-radius: 10px; margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(15,36,86,.06);
    border: 1px solid var(--brand-silver-light);
  }
  .topbar .user-info { font-size: 13px; color: var(--brand-text-soft); }
  .topbar .user-info b { color: var(--brand-primary); }

  /* 卡片 */
  .card { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(15,36,86,.05); border: 1px solid var(--brand-silver-light);
  }
  .card h3 { margin-bottom: 16px; font-size: 15px; color: var(--brand-primary);
    padding-bottom: 12px; border-bottom: 1px solid var(--brand-silver-light);
    display: flex; justify-content: space-between; align-items: center; font-weight: 600; letter-spacing: .5px;
  }
  .card h3 .actions { display: flex; gap: 8px; }

  /* 表格 */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--brand-silver-light); }
  th { background: linear-gradient(180deg, #f4f6fb, #e8ecf3); color: var(--brand-text); font-weight: 600; font-size: 12px; letter-spacing: .5px; }
  tr:hover td { background: #fafbfd; }
  .table-wrap { overflow-x: auto; }

  /* 表单网格 */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 14px; }

  /* KPI 卡片（按银蓝主调重做）*/
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent)); color: #fff;
    padding: 18px; border-radius: 10px; box-shadow: 0 4px 12px rgba(26,58,138,.2);
    position: relative; overflow: hidden;
  }
  .kpi::before { content:''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px;
    background: rgba(255,255,255,.08); border-radius: 50%;
  }
  .kpi .label { font-size: 12px; opacity: .9; margin-bottom: 6px; letter-spacing: .5px; }
  .kpi .value { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .kpi.green { background: linear-gradient(135deg, #0a7a5c, #1ca47b); }
  .kpi.orange { background: linear-gradient(135deg, #b8651b, #e6a23c); }
  .kpi.red { background: linear-gradient(135deg, #a8221c, #e74c3c); }
  .kpi.blue { background: linear-gradient(135deg, #1a4f8a, #2e7dd6); }
  .kpi.purple { background: linear-gradient(135deg, #4a2887, #7b3fcc); }
  .kpi.silver { background: linear-gradient(135deg, #5a6478, #8b94a8); }

  /* 标签 */
  .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .tag-green { background: #e7f7ee; color: #1ca47b; }
  .tag-red { background: #fff1f0; color: #c0392b; }
  .tag-blue { background: #e6efff; color: var(--brand-primary); }
  .tag-orange { background: #fff7e6; color: #b8651b; }

  /* 工具条 */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar input, .toolbar select { padding: 8px 10px; border: 1px solid var(--brand-silver); border-radius: 6px; }

  .action-link { color: var(--brand-primary); cursor: pointer; margin-right: 8px; font-size: 13px; font-weight: 500; }
  .action-link:hover { text-decoration: underline; }
  .action-link.danger { color: #c0392b; }

  .tip { background: linear-gradient(90deg, #fff8e6, #fffbf0); border-left: 3px solid var(--brand-accent);
    padding: 10px 14px; font-size: 13px; color: var(--brand-text-soft); margin-bottom: 14px; border-radius: 4px;
  }
  .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }

  /* 模态框 */
  .modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,36,86,.5);
    display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(2px);
  }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 520px; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 30px 80px rgba(15,36,86,.4);
  }
  .modal h3 { margin-bottom: 16px; color: var(--brand-primary); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* 看板图表区 */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }

  /* ================================================
   * 移动端汉堡按钮 + 抽屉式侧边栏
   * ================================================ */
  .menu-toggle { display: none; cursor: pointer; padding: 6px 10px; border-radius: 6px;
    background: var(--brand-primary); color: #fff; font-size: 18px; line-height: 1;
    border: none; margin-right: 12px;
  }
  .sidebar-mask { display: none; position: fixed; inset: 0; background: rgba(15,36,86,.5);
    z-index: 998; backdrop-filter: blur(2px);
  }
  .sidebar-mask.show { display: block; }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 240px;
      transform: translateX(-100%); transition: transform .25s ease;
      z-index: 999; overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 14px; width: 100%; }
    .menu-toggle { display: inline-block; }
    .topbar { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .topbar .user-info { font-size: 12px; flex: 1; min-width: 0; }
    .card { padding: 14px; border-radius: 8px; }
    .card h3 { font-size: 14px; }
    .form-grid { grid-template-columns: 1fr; gap: 10px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .kpi { padding: 14px; }
    .kpi .value { font-size: 18px; }
    .kpi .label { font-size: 11px; }
    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    .role-tabs { grid-template-columns: 1fr 1fr; }
    .login-card { width: calc(100vw - 32px); padding: 28px 22px; }
    .modal { width: calc(100vw - 32px); padding: 18px; }
    .toolbar { gap: 6px; }
    .toolbar input, .toolbar select { padding: 7px 9px; font-size: 13px; }
    .btn { font-size: 14px; padding: 10px; }
    .btn-sm { padding: 7px 12px; font-size: 12px; }
  }
  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .kpi .value { font-size: 16px; }
  }

  /* Toast 提示 */
  .toast { position: fixed; left: 50%; top: 30%; transform: translate(-50%, -50%) scale(.9);
    background: rgba(15,36,86,.95); color: #fff; padding: 18px 28px; border-radius: 10px;
    font-size: 15px; font-weight: 500; box-shadow: 0 10px 40px rgba(15,36,86,.4);
    z-index: 9999; opacity: 0; transition: opacity .2s, transform .25s; pointer-events: none;
    min-width: 200px; text-align: center; backdrop-filter: blur(4px);
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .toast.success { background: rgba(28,164,123,.95); }
  .toast.error { background: rgba(192,57,43,.95); }
  .toast .icon { font-size: 32px; display: block; margin-bottom: 6px; }
</style>
</head>
<body>

<!-- ============ 登录页 ============ -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <div class="brand-block">
      <img src="uploads/logo.jpg" alt="仕净" class="brand-logo"/>
      <h1>仕净管理系统</h1>
      <p class="subtitle">SHIJING · 内部协作中台 · v6</p>
    </div>

    <div class="role-tabs" style="margin-bottom:18px">
      <div class="role-tab active" data-mode="login" onclick="switchAuthMode('login')">登 录</div>
      <div class="role-tab" data-mode="register" onclick="switchAuthMode('register')">注 册</div>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input id="loginUsername" placeholder="请输入用户名" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="请输入密码" autocomplete="current-password"/>
      </div>
      <button class="btn" id="loginBtn">登 录</button>
      <p style="margin-top:14px;font-size:12px;color:#999;text-align:center">首次使用请先注册，等待总部审批</p>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>真实姓名 *</label>
        <input id="regRealName" placeholder="如 张明"/>
      </div>
      <div class="form-group">
        <label>用户名 *（登录用，至少 3 字符）</label>
        <input id="regUsername" placeholder="字母 / 数字"/>
      </div>
      <div class="form-group">
        <label>密码 *（至少 4 字符）</label>
        <input type="password" id="regPwd" placeholder="自己设一个"/>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>业务线 *</label>
          <select id="regRole" onchange="onRegRoleChange()">
            <option value="ad">营销线</option>
            <option value="cs">客服销售线</option>
            <option value="store">市场线</option>
          </select>
        </div>
        <div class="form-group">
          <label>所属部门 *</label>
          <select id="regTeam"></select>
        </div>
      </div>
      <button class="btn" id="registerBtn">提交注册</button>
      <p style="margin-top:14px;font-size:12px;color:#999;text-align:center">提交后等待总部审批通过即可登录</p>
    </div>
  </div>
</div>

<!-- ============ 主体框架 ============ -->
<div id="appPage" class="layout hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="uploads/logo.jpg" alt="仕净"/>
      <div>
        <div class="brand-name">仕净管理系统</div>
        <div class="brand-role" id="roleTitle">控制台</div>
      </div>
    </div>
    <div id="menuList"></div>
    <div style="padding:20px;margin-top:20px;border-top:1px solid #34495e">
      <button class="btn btn-danger btn-sm" id="logoutBtn" style="width:100%">退出登录</button>
    </div>
  </aside>
  <div class="sidebar-mask" id="sidebarMask" onclick="toggleSidebar(false)"></div>
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="user-info">当前：<b id="curRole"></b> · <b id="curTeam"></b></div>
      <div>
        <span style="font-size:12px;color:#999" id="curTime"></span>
      </div>
    </div>
    <div id="pageContent"></div>
  </main>
</div>

<!-- 模态框容器 -->
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ============================================================
 * 数据层：本地 Express API（VPS 版本）
 * ============================================================ */
const API_BASE = ''; // 同源，直接 /api/xxx
let CLOUD_READY = false;

async function api(path, body) {
  try {
    const res = await fetch(API_BASE + '/api/' + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Token': getToken() },
      body: body ? JSON.stringify(body) : '{}',
    });
    return await res.json();
  } catch (e) {
    console.error('[API]', path, e);
    return { ok: false, error: e.message };
  }
}

async function initCloudBase() {
  // VPS 版本：直接 ping 后端
  try {
    const res = await api('diagnose');
    if (res.ok) {
      CLOUD_READY = true;
      console.log('[VPS] 后端连接成功，counts:', res.counts);
      return true;
    }
    console.error('[VPS] 后端连接失败', res);
    if (typeof showToast === 'function') showToast('后端连接失败，请联系管理员', 'error', 6000);
    return false;
  } catch (e) {
    console.error('[VPS] 后端连接异常', e);
    if (typeof showToast === 'function') showToast('后端连接失败：' + (e.message||'').slice(0,80), 'error', 6000);
    return false;
  }
}

async function pullCloudData() {
  if (!CLOUD_READY) return;
  // 业务数据
  const r1 = await api('list');
  if (r1.ok) {
    DB.ad = r1.data.ad || [];
    DB.cs = r1.data.cs || [];
    DB.store = r1.data.store || [];
    DB.invite = r1.data.invite || [];
    console.log('[拉取] 业务数据', { ad: DB.ad.length, cs: DB.cs.length, store: DB.store.length, invite: DB.invite.length });
  } else {
    console.warn('[拉取] list 失败', r1);
  }
  // 配置（GET）
  try {
    const cfgRes = await fetch(API_BASE + '/api/config').then(r => r.json());
    if (cfgRes.ok && cfgRes.config) {
      const cloudCfg = cfgRes.config;
      if (cloudCfg.teams) DB.teams = cloudCfg.teams;
      if (cloudCfg.wecomConfig) DB.wecomConfig = cloudCfg.wecomConfig;
    } else {
      await pushCloudConfig();
    }
  } catch (e) { console.warn('[拉取] config', e); }
}

async function pushCloudRecord(col, record) {
  if (!CLOUD_READY) { showToast('后端未就绪，仅存本地', 'error', 3000); return false; }
  const res = await api('add', { collection: col, record });
  if (!res.ok) {
    console.warn('[写入]', col, res);
    showToast('写入失败：' + (res.error||'').slice(0, 100), 'error', 5000);
    return false;
  }
  return true;
}

async function updateCloudRecord(col, id, data) {
  if (!CLOUD_READY) return false;
  const res = await api('update', { collection: col, id, data });
  if (!res.ok) console.warn('[更新]', col, res);
  return res.ok;
}

async function deleteCloudRecord(col, id) {
  if (!CLOUD_READY) return false;
  const res = await api('delete', { collection: col, id });
  if (!res.ok) console.warn('[软删除]', col, res);
  return res.ok;
}

async function pushCloudConfig() {
  if (!CLOUD_READY) return;
  const res = await api('config', { teams: DB.teams, wecomConfig: DB.wecomConfig });
  if (!res.ok) console.warn('[写入] config 失败', res);
}

// 推送企业微信（直接走后端 /api/wecom-push）
async function callWecomCloudFunction(webhook, content) {
  if (!CLOUD_READY) return false;
  const res = await api('wecom-push', { webhook, content });
  return res && res.errcode === 0;
}

// 推送总部群（让后端从 config 读取 hqWebhook）
async function pushHQ(content) {
  if (!CLOUD_READY) return false;
  const res = await api('wecom-push-hq', { content });
  return res && res.ok;
}

function loadDB() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    const fresh = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    fresh._schema = SCHEMA_VERSION;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
    return fresh;
  }
  try {
    const db = JSON.parse(raw);
    // schema 升级：保留业务数据，强制刷新 teams 配置
    if (db._schema !== SCHEMA_VERSION) {
      console.log('[DB] schema 升级：', db._schema, '→', SCHEMA_VERSION, '，重置团队配置（保留业务数据）');
      db.teams = JSON.parse(JSON.stringify(DEFAULT_CONFIG.teams));
      db.wecomConfig = db.wecomConfig || JSON.parse(JSON.stringify(DEFAULT_CONFIG.wecomConfig));
      // 兼容性：补全新店的 webhook
      Object.keys(DEFAULT_CONFIG.wecomConfig.storeWebhooks).forEach(k => {
        if (!db.wecomConfig.storeWebhooks[k]) db.wecomConfig.storeWebhooks[k] = DEFAULT_CONFIG.wecomConfig.storeWebhooks[k];
      });
      db._schema = SCHEMA_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }
    // 兼容字段补全
    Object.keys(DEFAULT_CONFIG).forEach(k => { if (!(k in db)) db[k] = DEFAULT_CONFIG[k]; });
    return db;
  } catch (e) {
    return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
}
function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }

let DB = loadDB();

/* ============================================================
 * 会话状态

const SESSION_KEY = 'beauty_mgmt_session';
function getSession() { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; } }

const ROLE_HOME = { ad: 'ad_input', cs: 'cs_input', store: 'invite_pending', hq: 'hq_dashboard' };

// Toast 提示
function showToast(text, type = 'success', duration = 1600) {
  const root = document.getElementById('toastRoot');
  if (!root) return;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ⓘ';
  root.innerHTML = `<div class="toast ${type}"><span class="icon">${icon}</span>${text}</div>`;
  const el = root.firstChild;
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => { if (root.firstChild === el) root.innerHTML = ''; }, 300);
  }, duration);
}

// 提交成功后：toast + 切到对应角色主页（带菜单高亮）
function afterSubmit(text = '提交成功', goHome = true) {
  showToast(text, 'success');
  if (!goHome) return;
  const ses = getSession();
  if (!ses) return;
  const homeKey = ROLE_HOME[ses.role];
  if (!homeKey) return;
  // 切菜单高亮
  document.querySelectorAll('.menu-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === homeKey);
  });
  setTimeout(() => renderPage(homeKey), 350);
}

function teamsByRole(role) {
  return Object.entries(DB.teams).filter(([k,v]) => v.role === role).map(([k,v]) => ({ id: k, ...v }));
}

/* ============================================================
 * v6 登录 / 注册逻辑（基于用户名密码 + token）
 * ============================================================ */
const TOKEN_KEY = 'shijing_token_v6';
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

window.switchAuthMode = (mode) => {
  document.querySelectorAll('.login-card .role-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', mode !== 'register');
  if (mode === 'register') refreshRegTeamSelect();
};

function refreshRegTeamSelect() {
  const role = document.getElementById('regRole').value;
  const sel = document.getElementById('regTeam');
  const teams = teamsByRole(role);
  sel.innerHTML = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}
window.onRegRoleChange = refreshRegTeamSelect;

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPwd').value.trim();
  if (!username || !password) return alert('请输入用户名和密码');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const res = await api('login', { username, password });
    if (!res.ok) return alert('登录失败：' + res.error);
    setToken(res.token);
    window.__USER__ = res.user;
    enterApp();
  } finally { btn.disabled = false; btn.textContent = '登 录'; }
};

document.getElementById('registerBtn').onclick = async () => {
  const realName = document.getElementById('regRealName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPwd').value.trim();
  const role = document.getElementById('regRole').value;
  const teamId = document.getElementById('regTeam').value;
  if (!realName || !username || !password) return alert('请填写完整');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = '提交中...';
  try {
    const res = await api('register', { username, password, realName, role, teamId });
    if (!res.ok) return alert('注册失败：' + res.error);
    alert('✅ 注册成功！请等待总部审批通过后即可登录');
    switchAuthMode('login');
    document.getElementById('loginUsername').value = username;
  } finally { btn.disabled = false; btn.textContent = '提交注册'; }
};

document.getElementById('logoutBtn').onclick = async () => {

};

window.clearSession = function() { clearToken(); window.__USER__ = null; };

/* ============================================================
 * 进入主体
 * ============================================================ */
function enterApp() {
  const ses = getSession();
  if (!ses) return;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appPage').classList.remove('hidden');
  document.getElementById('roleTitle').textContent = ROLE_LABEL[ses.role];
  document.getElementById('curRole').textContent = ROLE_LABEL[ses.role];
  document.getElementById('curTeam').textContent = ses.teamName + (ses.userName ? ' / ' + ses.userName : '');
  buildMenu(ses);
  // 时间
  const updateTime = () => document.getElementById('curTime').textContent = new Date().toLocaleString('zh-CN');
  updateTime(); setInterval(updateTime, 30000);
  // 7点未反馈提醒检查（仅总部跑，避免重复推送）
  if (ses.role === 'hq') {
    setTimeout(checkPendingReminders, 1500);
    setInterval(checkPendingReminders, 5 * 60 * 1000);
  }
}

function buildMenu(ses) {
  const list = document.getElementById('menuList');
  list.innerHTML = MENU[ses.role].map((m, i) => `<div class="menu-item ${i===0?'active':''}" data-key="${m.key}">${m.label}</div>`).join('');
  list.querySelectorAll('.menu-item').forEach(el => {
    el.onclick = () => {
      list.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      renderPage(el.dataset.key);
      // 移动端点击菜单后自动收起
      if (window.innerWidth <= 768) toggleSidebar(false);
    };
  });
  renderPage(MENU[ses.role][0].key);
}

window.toggleSidebar = (force) => {
  const sb = document.querySelector('.sidebar');
  const mask = document.getElementById('sidebarMask');
  if (!sb) return;
  const willOpen = force === undefined ? !sb.classList.contains('open') : force;
  sb.classList.toggle('open', willOpen);
  mask.classList.toggle('show', willOpen);
};

/* ============================================================
 * 页面渲染分发
 * ============================================================ */
function renderPage(key) {
  const root = document.getElementById('pageContent');
  const ses = getSession();
  switch (key) {
    case 'ad_input': return renderAdInput(root, ses);
    case 'ad_list': return renderAdList(root, ses);
    case 'cs_input': return renderCsInput(root, ses);
    case 'cs_list': return renderCsList(root, ses);
    case 'invite_input': return renderInviteInput(root, ses);
    case 'invite_list': return renderInviteList(root, ses);
    case 'invite_pending': return renderStorePending(root, ses);
    case 'walk_in': return renderWalkIn(root, ses);
    case 'store_list': return renderStoreList(root, ses);
    case 'hq_dashboard': return renderHQDashboard(root);
    case 'hq_report': return renderHQReport(root);
    case 'hq_detail': return renderHQDetail(root);
    case 'hq_invite': return renderHQInvite(root);
    case 'hq_users': return renderHQUsers(root);
    case 'hq_settings': return renderHQSettings(root);
  }
}

/* ============================================================
 * 投放：录入 + 列表
 * ============================================================ */
function renderAdInput(root, ses) {
  root.innerHTML = `
    <div class="card">
      <h3>📊 投放数据录入 <span style="font-size:12px;color:#999">${ses.teamName}</span></h3>
      <div class="tip">填入当日广告消耗与加粉数据；加粉成本会自动计算。</div>
      <div class="form-grid">
        <div class="form-group"><label>日期</label><input type="date" id="ad_date" value="${today()}"/></div>
        <div class="form-group"><label>广告消耗（元）</label><input type="number" id="ad_cost" step="0.01" placeholder="如 5000"/></div>
        <div class="form-group"><label>加粉人数</label><input type="number" id="ad_fans" placeholder="如 50"/></div>
        <div class="form-group"><label>加粉成本（自动）</label><input id="ad_cpf" disabled placeholder="自动计算"/></div>
      </div>
      <button class="btn btn-sm" id="ad_save">保存</button>
    </div>
  `;
  const calc = () => {
    const c = +document.getElementById('ad_cost').value || 0;
    const f = +document.getElementById('ad_fans').value || 0;
    document.getElementById('ad_cpf').value = f ? (c/f).toFixed(2) : '';
  };
  ['ad_cost','ad_fans'].forEach(id => document.getElementById(id).oninput = calc);
  document.getElementById('ad_save').onclick = async () => {
    const date = document.getElementById('ad_date').value;
    const cost = +document.getElementById('ad_cost').value;
    const addFans = +document.getElementById('ad_fans').value;
    if (!date || !cost || !addFans) return alert('请填写完整');
    const btn = document.getElementById('ad_save');
    btn.disabled = true; btn.textContent = '提交中...';
    try {
      const rec = { id: uid(), teamId: ses.teamId, date, cost, addFans, costPerFan: +(cost/addFans).toFixed(2), createdAt: Date.now() };
      DB.ad.push(rec);
      saveDB();
      const ok = await pushCloudRecord('ad', rec);
      if (!ok && CLOUD_READY) {
        showToast('云端写入失败，已存本地。请检查网络后到「数据管理」点同步', 'error', 4000);
      } else {
        afterSubmit('投放数据已提交');
      }
    } finally {
      btn.disabled = false; btn.textContent = '保存';
    }
  };
}
function renderAdList(root, ses) {
  const data = DB.ad.filter(x => x.teamId === ses.teamId).sort((a,b) => b.date.localeCompare(a.date));
  root.innerHTML = `
    <div class="card">
      <h3>📋 我的投放记录</h3>
      ${data.length === 0 ? '<div class="empty">暂无数据</div>' :
      `<div class="table-wrap"><table>
        <thead><tr><th>日期</th><th>广告消耗</th><th>加粉人数</th><th>加粉成本</th><th>操作</th></tr></thead>
        <tbody>${data.map(x => `<tr>
          <td>${x.date}</td><td>${fmtMoney(x.cost)}</td><td>${fmtNum(x.addFans)}</td>
          <td>${fmtMoney(x.costPerFan)}</td>
          <td><span class="action-link danger" onclick="delAd('${x.id}')">删除</span></td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>`;
}
// 删除业务记录时推送总部群（VPS 版直接走 pushHQ API）
async function notifyHQDelete(category, record, ses) {
  const teamName = (DB.teams[ses.teamId] && DB.teams[ses.teamId].name) || ses.teamId;
  const time = new Date().toLocaleString('zh-CN');
  let detail = '';
  if (category === '投放数据') {
    detail = `> 日期：${record.date}\n> 广告消耗：¥${record.cost}\n> 加粉人数：${record.addFans}\n> 加粉成本：¥${record.costPerFan}`;
  } else if (category === '客服销售（定金）数据') {
    detail = `> 日期：${record.date}\n> 定金数：${record.depositCount} 单\n> 定金金额：¥${record.depositAmount}`;
  } else if (category === '门店服务（顾客到店）数据') {
    detail = `> 日期：${record.date}\n> 客户：**${record.customerName||'-'}**\n> 来源：${record.walkIn ? '非客服到店' : '客服邀约'}${record.source ? ' · ' + record.source : ''}\n> 操作金额：¥${record.opAmount||0} | 成单金额：¥${record.closedAmount||0}\n> 业绩贡献人：${record.performer||'-'}`;
  }
  const content = `## ⚠️ 数据删除提醒\n` +

function renderInviteInput(root, ses) {
  const stores = teamsByRole('store');
  root.innerHTML = `
    <div class="card">
      <h3>📞 客户邀约登记</h3>
      <div class="tip">提交后将通过企业微信群机器人推送至对应门店；门店反馈后数据自动同步到门店服务记录。</div>
      <div class="form-grid">
        <div class="form-group"><label>客户姓名</label><input id="inv_name" placeholder="如 张哥"/></div>
        <div class="form-group"><label>客户电话</label><input id="inv_phone" placeholder="11位手机号"/></div>
        <div class="form-group"><label>预计到店时间</label><input type="datetime-local" id="inv_time"/></div>
        <div class="form-group"><label>到店门店</label>
          <select id="inv_store">${stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>备注（选填）</label>
          <textarea id="inv_remark" rows="2" placeholder="客户情况、特殊需求等"></textarea>
        </div>
      </div>
      <button class="btn btn-sm" id="inv_save">提交并通知门店</button>
    </div>
  `;
  document.getElementById('inv_save').onclick = async () => {
    const customerName = document.getElementById('inv_name').value.trim();
    const phone = document.getElementById('inv_phone').value.trim();
    const arriveTime = document.getElementById('inv_time').value;
    const storeTeamId = document.getElementById('inv_store').value;
    const remark = document.getElementById('inv_remark').value.trim();
    if (!customerName || !phone || !arriveTime) return alert('请填写完整');
    const rec = { id: uid(), csTeamId: ses.teamId, csTeamName: ses.teamName, storeTeamId,
      customerName, phone, arriveTime, remark, status: 'pending', notified: false, createdAt: Date.now() };
    DB.invite.push(rec);
    saveDB();
    await pushCloudRecord('invite', rec);

    // 推送规则：
    // - 到店日期 = 今天 → 立即推送门店群
    // - 到店日期 > 今天（提前预约）→ 不立即推送，等到当天 09:00 自动推送
    const arriveDate = (arriveTime || '').slice(0, 10);
    const todayStr = today();
    if (arriveDate === todayStr) {
      const ok = await pushWecom(rec, 'arrival');
      rec.notified = ok;
      saveDB();
      await updateCloudRecord('invite', rec.id, { notified: ok, scheduledPush: false });
      afterSubmit(ok ? '邀约已提交，门店已收到通知' : '邀约已提交（推送失败请联系总部）');
    } else {
      // 标记为待定时推送
      rec.notified = false;
      rec.scheduledPush = true;
      saveDB();
      await updateCloudRecord('invite', rec.id, { notified: false, scheduledPush: true });
      afterSubmit('邀约已提交。到店日期为 ' + arriveDate + '，将于当天 09:00 自动推送门店群');
    }
  };
}

window.cancelInvite = async (id) => {
  const inv = DB.invite.find(x => x.id === id);
  if (!inv) return;
  const reason = prompt('请输入取消原因（必填）：\n例如：客户临时有事 / 客户改约 / 客户不来了', '客户临时有事');
  if (!reason || !reason.trim()) return alert('已取消操作（未填原因）');

  inv.status = 'cancelled';
  inv.cancelReason = reason.trim();
  inv.cancelledAt = Date.now();
  saveDB();
  await updateCloudRecord('invite', id, { status: 'cancelled', cancelReason: reason.trim(), cancelledAt: inv.cancelledAt });

  // 推送企业微信群（取消通知）
  const url = DB.wecomConfig.storeWebhooks[inv.storeTeamId];
  if (url) {
    const content = `## ❌ 顾客邀约已取消\n` +
      `> 客服团队：**${inv.csTeamName}**\n` +
      `> 客户姓名：<font color="warning">${inv.customerName}</font>\n` +
      `> 客户电话：${inv.phone}\n` +
      `> 原预计到店：~~${inv.arriveTime.replace('T',' ')}~~\n` +
      `> 取消原因：**${reason.trim()}**\n\n` +
      `请市场线老师悉知，无需准备接待。`;
    await sendWecomRaw(url, content);
  }

  showToast('已取消，门店群已收到通知', 'success');
  renderPage('invite_list');
};

  const ses = getSession();
  const rec = DB.store.find(x => x.id === id);
  DB.store = DB.store.filter(x => x.id !== id);
  saveDB();
  await deleteCloudRecord('store', id);
  if (rec) await notifyHQDelete('门店服务（顾客到店）数据', rec, ses);
  renderPage('store_list');
};

/* ============================================================
 * 管理总部：聚合计算
 * ============================================================ */
function aggregateByDate(startDate, endDate, teamFilter = {}) {
  // teamFilter: {ad:teamId, cs:teamId, store:teamId} 任意维度筛选；空对象=全部
  const inRange = (d) => (!startDate || d >= startDate) && (!endDate || d <= endDate);
  const ad = DB.ad.filter(x => inRange(x.date) && (!teamFilter.ad || x.teamId === teamFilter.ad));
  const cs = DB.cs.filter(x => inRange(x.date) && (!teamFilter.cs || x.teamId === teamFilter.cs));
  const store = DB.store.filter(x => inRange(x.date) && (!teamFilter.store || x.teamId === teamFilter.store));
  // 邀约（用于到店数）
  const invite = DB.invite.filter(x => inRange(fmtDate(x.arriveTime)));
  return { ad, cs, store, invite };
}

function calcMetrics({ad, cs, store, invite}) {
  const adCost = ad.reduce((s,x) => s + (x.cost||0), 0);
  const addFans = ad.reduce((s,x) => s + (x.addFans||0), 0);
  const costPerFan = safeDiv(adCost, addFans);
  const depositCount = cs.reduce((s,x) => s + (x.depositCount||0), 0);
  const depositCost = safeDiv(adCost, depositCount); // 定金成本=广告消耗/定金数

  // 新老客拆分
  const newCustomers = store.filter(x => x.customerType === '新客');
  const oldCustomers = store.filter(x => x.customerType === '老客');
  const newArriveCount = newCustomers.length;          // 新客到店数（计入到店成本分母）
  const oldArriveCount = oldCustomers.length;          // 老客到店数（仅展示，不计成本）
  const arriveCount = newArriveCount;                  // 到店数 = 仅新客到店
  const arriveCost = safeDiv(adCost, newArriveCount);  // 到店成本 = 广告消耗 / 新客到店

  // 操作 / 成单（仅基于新客）
  const newCount = newCustomers.length;
  const opCount = newCustomers.filter(x => x.isOperated === '是').length;
  const opRate = safeDiv(opCount, newCount) * 100;
  const opCost = safeDiv(adCost, opCount);
  const closeCount = newCustomers.filter(x => x.isClosed === '是').length;
  const closeRate = safeDiv(closeCount, newCount) * 100;
  const closeCost = safeDiv(adCost, closeCount);

  // 营业额拆分（按客户类型）
  const newOpAmount = newCustomers.reduce((s,x) => s + (x.opAmount||0), 0);
  const newCloseAmount = newCustomers.reduce((s,x) => s + (x.closedAmount||0), 0);
  const newRevenue = newOpAmount + newCloseAmount;     // 新客营业额
  const oldOpAmount = oldCustomers.reduce((s,x) => s + (x.opAmount||0), 0);
  const oldCloseAmount = oldCustomers.reduce((s,x) => s + (x.closedAmount||0), 0);
  const oldRevenue = oldOpAmount + oldCloseAmount;     // 老客营业额
  const opAmount = newOpAmount + oldOpAmount;          // 总操作金额
  const closeAmount = newCloseAmount + oldCloseAmount; // 总成单金额
  const revenue = newRevenue + oldRevenue;             // 总营业额
  const roi = safeDiv(revenue, adCost);

  return {
    adCost, addFans, costPerFan,
    depositCount, depositCost,
    arriveCount, arriveCost,
    newArriveCount, oldArriveCount,
    newCount, opCount, opRate, opCost,
    closeCount, closeCost, closeRate, closeAmount,
    opAmount, revenue, roi,
    newRevenue, oldRevenue, newOpAmount, newCloseAmount, oldOpAmount, oldCloseAmount,
  };
}

function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

function renderHQDashboard(root) {

  const start = fmtDate(new Date(Date.now() - 29*86400000));
  root.innerHTML = `

      </div>

      <div class="chart-grid" style="margin-top:20px">

      <div class="kpi"><div class="label">广告消耗</div><div class="value">${fmtMoney(m.adCost)}</div></div>

      <div class="kpi red"><div class="label">成单数 / 成单率</div><div class="value">${fmtNum(m.closeCount)} / ${fmtPct(m.closeRate)}</div></div>
      <div class="kpi blue"><div class="label">新客营业额</div><div class="value">${fmtMoney(m.newRevenue)}</div></div>
      <div class="kpi orange"><div class="label">老客营业额</div><div class="value">${fmtMoney(m.oldRevenue)}</div></div>
      <div class="kpi"><div class="label">总营业额</div><div class="value">${fmtMoney(m.revenue)}</div></div>
      <div class="kpi green"><div class="label">ROI</div><div class="value">${m.roi.toFixed(2)}</div></div>
    </div>`;

  // 按日聚合

  const cur = new Date(s);
  const last = new Date(e);
  while (cur <= last) { dates.push(fmtDate(cur)); cur.setDate(cur.getDate()+1); }
  const dayData = dates.map(d => calcMetrics(aggregateByDate(d, d)));

  chartInstances.push(new Chart(document.getElementById('chart1'), {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [
        { label: '广告消耗', data: dayData.map(x => x.adCost), backgroundColor: '#1a3a8a' },
        { label: '新客营业额', data: dayData.map(x => x.newRevenue), backgroundColor: '#2e5dd6' },

    type: 'doughnut',
    data: {
      labels: adTeams.map(t => t.name),
      datasets: [{ data: adTeams.map(t => DB.ad.filter(a => a.teamId === t.id && a.date >= s && a.date <= e).reduce((sum,x) => sum+x.cost, 0)),
        backgroundColor: ['#1a3a8a','#2e5dd6','#5a78c8','#8b94a8','#c8d0db'] }],
    },
  }));
}

/* ============================================================
 * 管理总部：数据报表（指标合计 + 按团队）
 * ============================================================ */
function renderHQReport(root) {
  const end = today();
  const start = fmtDate(new Date(Date.now() - 29*86400000));
  root.innerHTML = `
    <div class="card">
      <h3>📊 数据报表</h3>
      <div class="toolbar">
        <input type="date" id="rp_start" value="${start}"/>
        <span style="line-height:32px">至</span>
        <input type="date" id="rp_end" value="${end}"/>
        <button class="btn btn-sm" onclick="doReport()">生成</button>
        <button class="btn btn-sm btn-success" onclick="exportReport()">导出CSV</button>
      </div>
      <div id="rp_total"></div>
      <h3 style="margin-top:24px">按团队拆分</h3>
      <div id="rp_teams"></div>
    </div>`;
  doReport();
}
window.doReport = () => {
  const s = document.getElementById('rp_start').value;
  const e = document.getElementById('rp_end').value;
  const m = calcMetrics(aggregateByDate(s, e));
  const cols = [
    ['广告消耗', fmtMoney(m.adCost)], ['加粉人数', fmtNum(m.addFans)], ['加粉成本', fmtMoney(m.costPerFan)],
    ['定金数', fmtNum(m.depositCount)], ['定金成本', fmtMoney(m.depositCost)],
    ['新客到店数', fmtNum(m.newArriveCount)], ['老客到店数', fmtNum(m.oldArriveCount)], ['到店成本（按新客）', fmtMoney(m.arriveCost)],
    ['操作数', fmtNum(m.opCount)], ['操作率', fmtPct(m.opRate)], ['新顾客操作成本', fmtMoney(m.opCost)],
    ['成单数', fmtNum(m.closeCount)], ['成单成本', fmtMoney(m.closeCost)], ['成单率', fmtPct(m.closeRate)], ['成单金额', fmtMoney(m.closeAmount)],
    ['新客营业额', fmtMoney(m.newRevenue)], ['老客营业额', fmtMoney(m.oldRevenue)], ['总营业额', fmtMoney(m.revenue)],
    ['ROI', m.roi.toFixed(2)],
  ];
  document.getElementById('rp_total').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>指标</th><th>数值</th></tr></thead>
      <tbody>${cols.map(([k,v]) => `<tr><td>${k}</td><td><b>${v}</b></td></tr>`).join('')}</tbody>
    </table></div>`;

  // 按投放团队拆分
  const adTeams = teamsByRole('ad');
  const csTeams = teamsByRole('cs');
  const storeTeams = teamsByRole('store');
  const rows = [];
  // 营销线维度
  adTeams.forEach(t => {
    const sub = aggregateByDate(s, e, { ad: t.id });
    const sm = calcMetrics(sub);
    rows.push([`【营销】${t.name}`, fmtMoney(sm.adCost), fmtNum(sm.addFans), fmtMoney(sm.costPerFan), '-', '-', '-', '-', '-', '-']);
  });
  csTeams.forEach(t => {
    const sub = aggregateByDate(s, e, { cs: t.id });
    const sm = calcMetrics(sub);
    rows.push([`【客服】${t.name}`, '-', '-', '-', fmtNum(sm.depositCount), '-', '-', '-', '-', '-']);
  });
  storeTeams.forEach(t => {
    const sub = aggregateByDate(s, e, { store: t.id });
    const sm = calcMetrics(sub);
    rows.push([`【门店】${t.name}`, '-', '-', '-', '-', fmtNum(sm.newArriveCount), fmtNum(sm.oldArriveCount), fmtNum(sm.closeCount), fmtMoney(sm.newRevenue), fmtMoney(sm.oldRevenue)]);
  });
  document.getElementById('rp_teams').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>团队</th><th>广告消耗</th><th>加粉</th><th>加粉成本</th><th>定金数</th><th>新客到店</th><th>老客到店</th><th>成单数</th><th>新客营业额</th><th>老客营业额</th></tr></thead>
      <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>`;

};
window.exportReport = () => {
  const s = document.getElementById('rp_start').value;
  const e = document.getElementById('rp_end').value;
  const m = calcMetrics(aggregateByDate(s, e));
  const lines = [
    '指标,数值',
    `广告消耗,${m.adCost}`, `加粉人数,${m.addFans}`, `加粉成本,${m.costPerFan.toFixed(2)}`,
    `定金数,${m.depositCount}`, `定金成本,${m.depositCost.toFixed(2)}`,
    `新客到店数,${m.newArriveCount}`, `老客到店数,${m.oldArriveCount}`, `到店成本（按新客）,${m.arriveCost.toFixed(2)}`,
    `操作数,${m.opCount}`, `操作率,${m.opRate.toFixed(2)}%`, `新顾客操作成本,${m.opCost.toFixed(2)}`,
    `成单数,${m.closeCount}`, `成单成本,${m.closeCost.toFixed(2)}`, `成单率,${m.closeRate.toFixed(2)}%`, `成单金额,${m.closeAmount.toFixed(2)}`,
    `新客营业额,${m.newRevenue.toFixed(2)}`, `老客营业额,${m.oldRevenue.toFixed(2)}`, `总营业额,${m.revenue.toFixed(2)}`,
    `ROI,${m.roi.toFixed(2)}`,
  ];
  const blob = new Blob(['\ufeff' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `报表_${s}_${e}.csv`; a.click();
};

async function renderHQUsers(root) {
  root.innerHTML = `<div class="card"><h3>👥 用户审批管理</h3><div class="empty">加载中...</div></div>`;
  const res = await api('users-list');
  if (!res.ok) {
    root.innerHTML = `<div class="card"><h3>👥 用户审批管理</h3><div class="empty">加载失败：${res.error||''}</div></div>`;
    return;
  }
  const ROLE_LABEL_MAP = { ad: '营销线', cs: '客服销售线', store: '市场线', hq: '总部服务线' };
  const teamName = id => (DB.teams[id] && DB.teams[id].name) || id;
  const statusTag = s => s==='approved' ? '<span class="tag tag-green">已通过</span>'
                      : s==='pending' ? '<span class="tag tag-orange">待审批</span>'
                      : s==='rejected' ? '<span class="tag tag-red">已拒绝</span>'
                      : '<span class="tag tag-red">已停用</span>';

  const pending = res.users.filter(u => u.status === 'pending');
  const others = res.users.filter(u => u.status !== 'pending');

  root.innerHTML = `
    <div class="card">
      <h3>⏳ 待审批 (${pending.length})</h3>
      ${pending.length === 0 ? '<div class="empty">暂无待审批用户</div>' :
      `<div class="table-wrap"><table>
        <thead><tr><th>用户名</th><th>真实姓名</th><th>业务线</th><th>部门</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody>${pending.map(u => `<tr>
          <td>${u.username}</td><td>${u.realName||'-'}</td>
          <td>${ROLE_LABEL_MAP[u.role]||u.role}</td>
          <td>${teamName(u.teamId)}</td>
          <td>${new Date(u.createdAt).toLocaleString('zh-CN')}</td>
          <td>
            <span class="action-link" onclick="approveUser('${u.id}', '${u.realName}')">通过</span>
            <span class="action-link danger" onclick="rejectUser('${u.id}', '${u.realName}')">拒绝</span>
          </td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>

    <div class="card">
      <h3>👤 全部账号 (${others.length})</h3>
      ${others.length === 0 ? '<div class="empty">暂无</div>' :
      `<div class="table-wrap"><table>
        <thead><tr><th>用户名</th><th>真实姓名</th><th>业务线</th><th>部门</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${others.map(u => `<tr>
          <td>${u.username}</td><td>${u.realName||'-'}</td>
          <td>${ROLE_LABEL_MAP[u.role]||u.role}</td>
          <td>${teamName(u.teamId)}</td>
          <td>${statusTag(u.status)}${u.rejectReason?'<div style="font-size:11px;color:#999">'+u.rejectReason+'</div>':''}</td>
          <td>
            ${u.status === 'approved' ? `<span class="action-link danger" onclick="toggleUser('${u.id}', 'disabled')">停用</span>` : ''}
            ${u.status === 'disabled' ? `<span class="action-link" onclick="toggleUser('${u.id}', 'approved')">启用</span>` : ''}
            ${u.status === 'rejected' ? `<span class="action-link" onclick="approveUser('${u.id}', '${u.realName}')">改为通过</span>` : ''}
            ${u.username !== 'admin' ? `<span class="action-link danger" onclick="deleteUser('${u.id}', '${u.username}')">删除</span>` : ''}
          </td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>
  `;
}

window.approveUser = async (id, name) => {
  if (!confirm('通过用户「' + (name||'') + '」的注册申请？')) return;
  const res = await api('users-approve', { id });
  if (res.ok) { showToast('已通过审批', 'success'); renderHQUsers(document.getElementById('pageContent')); }
  else alert('失败：' + res.error);
};
window.rejectUser = async (id, name) => {
  const reason = prompt('拒绝「' + (name||'') + '」的原因（必填）：', '部门不符');
  if (!reason) return;
  const res = await api('users-reject', { id, reason });
  if (res.ok) { showToast('已拒绝', 'success'); renderHQUsers(document.getElementById('pageContent')); }
  else alert('失败：' + res.error);
};
window.toggleUser = async (id, status) => {
  if (!confirm('确定' + (status==='disabled' ? '停用' : '启用') + '此账号？')) return;
  const res = await api('users-toggle', { id, status });
  if (res.ok) { showToast('已更新', 'success'); renderHQUsers(document.getElementById('pageContent')); }
  else alert('失败：' + res.error);
};
window.deleteUser = async (id, username) => {
  if (!confirm('确定删除用户「' + username + '」？此操作不可恢复。')) return;
  const res = await api('users-delete', { id });
  if (res.ok) { showToast('已删除', 'success'); renderHQUsers(document.getElementById('pageContent')); }
  else alert('失败：' + res.error);
};

window.syncLocalToCloud = async () => {
  if (!CLOUD_READY) return alert('后端未就绪，请刷新页面后重试');
  if (!confirm('将本浏览器 LocalStorage 中的所有业务数据推送到服务器。\n\n服务器已有相同 id 的不会重复（按 id 去重）。\n\n确定继续？')) return;
  const payload = { ad: DB.ad, cs: DB.cs, store: DB.store, invite: DB.invite };
  const res = await api('import', payload);
  showToast(`同步完成：上传 ${res.success || 0} 条，跳过 ${res.skipped || 0} 条`, 'success', 3000);
  await pullCloudData();
  saveDB();
  renderPage('hq_dashboard');
};
window.updatePwd = async (id) => {
  const v = document.getElementById('pwd_'+id).value.trim();
  if (!v) return alert('密码不能为空');
  DB.teams[id].password = v; saveDB();
  await pushCloudConfig();
  alert('已更新');
};
window.saveWecomConfig = async () => {
  teamsByRole('store').forEach(s => {
    DB.wecomConfig.storeWebhooks[s.id] = document.getElementById('wh_'+s.id).value.trim();
  });
  DB.wecomConfig.docArchiveUrl = document.getElementById('doc_url').value.trim();
  DB.wecomConfig.hqWebhook = (document.getElementById('hq_webhook')||{}).value ? document.getElementById('hq_webhook').value.trim() : (DB.wecomConfig.hqWebhook||'');
  DB.wecomConfig.reminderHour = +document.getElementById('rem_hour').value || 19;
  saveDB();
  await pushCloudConfig();
  alert('已保存');
};
window.testWecom = async () => {
  const stores = teamsByRole('store');
  for (const s of stores) {
    const url = DB.wecomConfig.storeWebhooks[s.id];
    if (!url) continue;
    const ok = await sendWecomRaw(url, `🦾 [系统测试] 这是来自内部管理系统的测试消息（${s.name}），如收到说明 webhook 配置成功。`);
    console.log(s.name, ok);
  }
  alert('已尝试推送，请到群里确认是否收到');
};
window.applyDefaultWebhook = () => {
  const DEFAULT_WH = 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=e4b195fe-ca8a-4514-b2f3-94e4ac8fe2e7';
  teamsByRole('store').forEach(s => {
    const el = document.getElementById('wh_'+s.id);
    if (el) el.value = DEFAULT_WH;
  });
  alert('已填入默认 webhook，请记得点击"保存配置"持久化');
};
window.exportAll = () => {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `系统数据备份_${today()}.json`; a.click();
};
window.importAll = () => {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = (e) => {
    const f = e.target.files[0]; const r = new FileReader();
    r.onload = () => { try { DB = JSON.parse(r.result); saveDB(); alert('导入成功'); location.reload(); } catch { alert('文件格式错误'); } };
    r.readAsText(f);
  };
  inp.click();
};
window.resetAll = () => {
  if (!confirm('⚠️ 此操作将清除所有业务数据（包括邀约/投放/客服/门店），密码与webhook配置将保留。确定继续？')) return;
  DB.ad = []; DB.cs = []; DB.store = []; DB.invite = []; DB.reminderLog = [];
  saveDB(); alert('已重置');
};

/* ============================================================
 * 企业微信群机器人推送
 * ============================================================ */
async function sendWecomRaw(webhookUrl, content) {
  if (!webhookUrl) { console.warn('[wecom] 未配置 webhook'); return false; }
  return await callWecomCloudFunction(webhookUrl, content);
}

async function pushWecom(invite, type, extra) {
  const url = DB.wecomConfig.storeWebhooks[invite.storeTeamId];
  if (!url) return false;
  let content;
  if (type === 'arrival') {
    content = `## 🦾 顾客即将到店通知
> 客户姓名：<font color="info">${invite.customerName}</font>
> 客户电话：${invite.phone}
> 预计到店：**${invite.arriveTime.replace('T',' ')}**
> 备注：${invite.remark || '无'}

请门店老师做好接待准备，到店后请在系统【🔔 待到店客户】中点击"已到店"并填写服务详情。`;
  } else if (type === 'remind') {
    content = `## ⏰ 顾客未反馈提醒（${DB.wecomConfig.reminderHour}点）
> 客户姓名：**${invite.customerName}**
> 客户电话：${invite.phone}
> 预计到店：${invite.arriveTime.replace('T',' ')}

该客户客服已邀约但门店尚未反馈，请门店尽快确认是否到店并在系统中提交。`;
  } else if (type === 'archive') {
    const archiveLine = DB.wecomConfig.docArchiveUrl
      ? `\n\n> 📌 请在【企业微信文档】中归档：${DB.wecomConfig.docArchiveUrl}`
      : '';
    content = `## 📁 客户档案留档
> 姓名：**${invite.customerName}**
> 电话：${invite.phone}
> 客户类型：${extra.customerType}
> 是否操作：${extra.isOperated} | 操作金额：¥${extra.opAmount}
> 是否成单：${extra.isClosed} | 成单金额：¥${extra.closedAmount}
> 业绩贡献人：${extra.performer || '-'}
> 备注：${extra.remark || '-'}${archiveLine}`;
  }
  return await sendWecomRaw(url, content);
}

/* ============================================================
 * 7点未反馈提醒（前端定时检查）
 * ============================================================ */
function checkPendingReminders() {
  const now = new Date();
  const targetHour = DB.wecomConfig.reminderHour;
  if (now.getHours() < targetHour) return;
  const todayStr = today();
  DB.invite.forEach(async (inv) => {
    if (inv.status !== 'pending') return;
    if (inv.remindedAt && fmtDate(inv.remindedAt) === todayStr) return;
    const arriveDate = fmtDate(inv.arriveTime);
    if (arriveDate !== todayStr) return; // 只提醒今天到店的
    const ok = await pushWecom(inv, 'remind');
    if (ok) {
      inv.remindedAt = Date.now();
      DB.reminderLog.push({ inviteId: inv.id, at: Date.now() });
      saveDB();
      await updateCloudRecord('invite', inv.id, { remindedAt: inv.remindedAt });
    }
  });
}

/* ============================================================
 * 启动
 * ============================================================ */
(async function bootstrap() {
  await initCloudBase();
  // v6: token 恢复用户态
  if (CLOUD_READY && getToken()) {
    const meRes = await api('me');
    if (meRes.ok) {
      window.__USER__ = meRes.user;
    } else {
      clearToken();
    }
  }
  if (CLOUD_READY && window.__USER__) {
    await pullCloudData();
    saveDB();
  }
  if (window.__USER__) enterApp();
  // 每 30 秒后台同步一次（已登录才同步）
  setInterval(async () => {
    if (CLOUD_READY && window.__USER__) {
      await pullCloudData();
      const cur = document.querySelector('.menu-item.active');
      if (cur) renderPage(cur.dataset.key);
    }
  }, 30000);
})();
