<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>仕净内部协作系统 · 登录</title>
<style>
  :root {
    --klein: #002fa7;
    --klein-deep: #001f6f;
    --klein-soft: #e6ebfa;
    --silver: #c0c5cc;
    --silver-soft: #e8eaee;
    --silver-bg: #f6f7f9;
    --ink: #1a1d24;
    --ink-soft: #4a4e57;
    --ink-mute: #8b919c;
    --paper: #ffffff;
    --danger: #c0392b;
    --shadow: 0 1px 3px rgba(20,28,56,.06);
    --shadow-lg: 0 8px 28px rgba(20,28,56,.08);
    --shadow-btn: 0 4px 14px rgba(0,47,167,.28);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: var(--silver-bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .layout {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 480px;
  }
  /* === 左侧 hero === */
  .hero {
    background: linear-gradient(150deg, #003ac9 0%, var(--klein) 42%, var(--klein-deep) 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 52px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -12%; right: -8%;
    width: 56%; height: 56%;
    background: radial-gradient(circle, rgba(255,255,255,.12) 0%, transparent 68%);
    pointer-events: none;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -18%; left: -12%;
    width: 48%; height: 48%;
    background: radial-gradient(circle, rgba(255,216,107,.10) 0%, transparent 70%);
    pointer-events: none;
  }
  /* 细网格纹理增加质感 */
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at 70% 30%, #000 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at 70% 30%, #000 0%, transparent 75%);
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }

  .hero-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hero-logo-img {
    width: 56px; height: 56px;
    border-radius: 8px;
    background: rgba(255,255,255,.12);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hero-logo-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .hero-logo-zh {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 4px;
  }
  .hero-logo-en {
    font-size: 11px;
    letter-spacing: 3px;
    opacity: .6;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .hero-version {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 26px;
    backdrop-filter: blur(4px);
  }
  .hero-version::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 0 3px rgba(74,222,128,.25);
  }
  .hero h1 {
    font-size: 44px;
    font-weight: 600;
    line-height: 1.25;
    margin: 0 0 16px;
    letter-spacing: -0.5px;
    position: relative;
  }
  .hero h1::before {
    content: "";
    position: absolute;
    left: -48px;
    top: 14px;
    width: 32px;
    height: 2px;
    background: rgba(255,255,255,.45);
  }
  .hero h1 em {
    font-style: normal;
    color: #ffd86b;
  }
  .hero p {
    font-size: 15px;
    opacity: .82;
    margin: 0;
    max-width: 420px;
    line-height: 1.7;
  }
  /* hero 特性点 */
  .hero-feats {
    display: flex;
    gap: 22px;
    margin-top: 30px;
    position: relative; z-index: 1;
  }
  .hero-feat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    opacity: .82;
  }
  .hero-feat .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ffd86b;
    flex: none;
  }
  .hero-foot {
    font-size: 12px;
    opacity: .55;
    position: relative; z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hero-foot a {
    color: inherit;
    opacity: .8;
    text-decoration: none;
  }
  .hero-foot a:hover { opacity: 1; text-decoration: underline; }

  /* === 右侧表单 === */
  .form-pane {
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }
  .form {
    width: 100%;
    max-width: 360px;
    animation: formIn .4s cubic-bezier(.4,0,.2,1);
  }
  @keyframes formIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .form-title {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 8px;
    color: var(--ink);
    letter-spacing: -.3px;
  }
  .form-sub {
    font-size: 13px;
    color: var(--ink-mute);
    margin: 0 0 32px;
  }
  .field { margin-bottom: 16px; }
  .label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: .2px;
  }
  .input-wrap {
    position: relative;
  }
  .input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    background: var(--silver-bg);
    border: 1px solid transparent;
    border-radius: 9px;
    color: var(--ink);
    font-size: 14px;
    outline: none;
    transition: border-color .18s, box-shadow .18s, background .18s;
    font-family: inherit;
  }
  .input::placeholder { color: #b9bec7; }
  .input:hover { background: #f0f1f4; }
  .input:focus {
    background: var(--paper);
    border-color: var(--klein);
    box-shadow: 0 0 0 3px rgba(0,47,167,.12);
  }
  .input-pwd { padding-right: 48px; }
  .pwd-toggle {
    position: absolute;
    right: 0; top: 0;
    height: 46px;
    width: 48px;
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s;
  }
  .pwd-toggle:hover { color: var(--klein); }

  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: -6px 0 16px;
  }
  .checkbox-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
  }
  .checkbox-label input { accent-color: var(--klein); }

  .btn {
    width: 100%;
    height: 48px;
    background: var(--klein);
    color: #fff;
    border: 0;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: background .15s, transform .15s, box-shadow .15s;
    letter-spacing: 4px;
    box-shadow: var(--shadow-btn);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover {
    background: var(--klein-deep);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,47,167,.36);
  }
  .btn:active { transform: translateY(0); }
  .btn:disabled {
    opacity: .65;
    cursor: wait;
    transform: none;
    box-shadow: var(--shadow-btn);
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.45);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { letter-spacing: 1px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .alert.show { display: block; }
  .alert-error {
    background: rgba(192,57,43,.06);
    color: var(--danger);
    border: 1px solid rgba(192,57,43,.2);
  }

  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--silver-soft);
    font-size: 12px;
    color: var(--ink-mute);
    line-height: 1.8;
    text-align: center;
  }
  .footer a { color: var(--klein); text-decoration: none; margin: 0 4px; }
  .footer a:hover { text-decoration: underline; }
  .footer .footer-tip {
    color: var(--ink-mute);
    margin-bottom: 6px;
  }

  /* === 移动端 === */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .hero {
      padding: 28px 24px 24px;
      min-height: auto;
    }
    .hero h1 {
      font-size: 26px;
      margin: 12px 0 10px;
    }
    .hero h1::before { display: none; }
    .hero p { font-size: 13px; }
    .hero-foot {
      margin-top: 16px;
      font-size: 11px;
    }
    .hero-version { margin-bottom: 14px; }
    .hero-logo-img { width: 44px; height: 44px; }
    .hero-logo-zh { font-size: 20px; }
    .hero-feats { display: none; }
    .hero-grid { display: none; }
    .form-pane { padding: 28px 24px 40px; }
    /* 移动端：输入框/下拉字号 ≥16px，避免 iOS Safari 聚焦时自动放大页面 */
    .input, select.input { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="hero">
    <div class="hero-grid"></div>
    <!-- 顶部 logo -->
    <div class="hero-content">
      <div class="hero-logo">
        <div class="hero-logo-img">
          <img src="/logo.jpg" alt="仕净" onerror="this.style.display='none';this.parentNode.textContent='SJ';this.parentNode.style.fontWeight='700';this.parentNode.style.fontSize='18px';this.parentNode.style.letterSpacing='2px';this.parentNode.style.color='#fff';">
        </div>
        <div class="hero-logo-text">
          <div class="hero-logo-zh">仕净</div>
          <div class="hero-logo-en">SHIJING</div>
        </div>
      </div>
    </div>

    <!-- 中部 slogan -->
    <div class="hero-content">
      <span class="hero-version">客户中心 CRM</span>
      <h1>专注<em>胡须</em><br>所以更专业</h1>
      <p>以客户为中心的一体化运营平台</p>
      <div class="hero-feats">
        <span class="hero-feat"><span class="dot"></span>客户全生命周期</span>
        <span class="hero-feat"><span class="dot"></span>多角色协同</span>
        <span class="hero-feat"><span class="dot"></span>实时跨部门联动</span>
      </div>
    </div>

    <!-- 底部版权 -->
    <div class="hero-foot">
      <span>© 2026 仕净 · 内部使用</span>
      <span>v6</span>
    </div>
  </div>

  <div class="form-pane">
    <form class="form" id="loginForm" autocomplete="on">
      <h2 class="form-title">欢迎回来</h2>
      <p class="form-sub">使用你的账号登录</p>

      <div class="alert alert-error" id="errBox"></div>

      <div class="field">
        <label class="label" for="username">用户名</label>
        <div class="input-wrap">
          <input type="text" class="input" id="username" name="username" placeholder="请输入登录用户名" autocomplete="username" autocapitalize="off" autocorrect="off" required>
        </div>
      </div>

      <div class="field">
        <label class="label" for="password">密码</label>
        <div class="input-wrap">
          <input type="password" class="input input-pwd" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
          <button type="button" class="pwd-toggle" id="pwdToggle" tabindex="-1" aria-label="显示/隐藏密码">显示</button>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" checked>
          记住用户名
        </label>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">登 录</span>
      </button>

      <div class="footer">
        <div class="footer-tip">还没有账号？</div>
        <a href="javascript:void(0)" id="applyBtn">申请账号</a>
        ·
        <a href="/legacy">旧版团队账号</a>
      </div>
    </form>

    <!-- 注册表单（默认隐藏，点"申请账号"显示）-->
    <form class="form" id="registerForm" style="display:none">
      <h2 class="form-title">申请账号</h2>
      <p class="form-sub">提交后等待总部审批，通过即可登录</p>

      <div class="alert alert-error" id="regErrBox"></div>

      <div class="field">
        <label class="label" for="r_realName">真实姓名 *</label>
        <input type="text" class="input" id="r_realName" required placeholder="如 李小明">
      </div>
      <div class="field">
        <label class="label" for="r_username">登录用户名（英文）*</label>
        <input type="text" class="input" id="r_username" required placeholder="3-32 位字母/数字/_-" pattern="[a-zA-Z0-9_\-]{3,32}">
      </div>
      <div class="field">
        <label class="label" for="r_password">密码 *</label>
        <input type="password" class="input" id="r_password" required minlength="6" placeholder="至少 6 位">
      </div>
      <div class="field">
        <label class="label" for="r_role">所属岗位 *</label>
        <select class="input" id="r_role" required>
          <option value="">请选择业务线</option>
          <option value="ad">营销业务线</option>
          <option value="cs">客服销售线</option>
          <option value="store">门店市场线</option>
        </select>
      </div>
      <div class="field">
        <label class="label" for="r_teamId">所属团队 *</label>
        <select class="input" id="r_teamId" required disabled>
          <option value="">请先选择业务线</option>
        </select>
      </div>
      <div class="field">
        <label class="label" for="r_reason">申请说明（选填）</label>
        <input type="text" class="input" id="r_reason" placeholder="一句话描述：你是谁、来做什么">
      </div>

      <button type="submit" class="btn" id="regBtn">
        <span class="spinner"></span>
        <span class="btn-text">提交申请</span>
      </button>

      <div class="footer">
        <a href="javascript:void(0)" id="backLogin">← 返回登录</a>
      </div>
    </form>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errBox = document.getElementById('errBox');
const btn = document.getElementById('submitBtn');
const btnText = btn.querySelector('.btn-text');
const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const rememberEl = document.getElementById('remember');

// 密码可见切换
const pwdToggle = document.getElementById('pwdToggle');
pwdToggle.addEventListener('click', () => {
  const isPwd = passwordEl.type === 'password';
  passwordEl.type = isPwd ? 'text' : 'password';
  pwdToggle.textContent = isPwd ? '隐藏' : '显示';
});

// 申请账号 / 返回登录 切换
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
document.getElementById('applyBtn').addEventListener('click', () => {
  loginForm.style.display = 'none';
  registerForm.style.display = 'block';
  loadRegisterTeams();
  document.getElementById('r_realName').focus();
});
document.getElementById('backLogin').addEventListener('click', () => {
  registerForm.style.display = 'none';
  loginForm.style.display = 'block';
  usernameEl.focus();
});

// 注册提交
const regErrBox = document.getElementById('regErrBox');
const regBtn = document.getElementById('regBtn');
const regBtnText = regBtn.querySelector('.btn-text');
const regRoleEl = document.getElementById('r_role');
const regTeamEl = document.getElementById('r_teamId');
const ROLE_LABELS = {
  ad: '营销业务线',
  cs: '客服销售线',
  store: '门店市场线',
};
let registerTeams = {};

function setTeamOptions(role) {
  const teams = Object.entries(registerTeams || {}).filter(([, team]) => team && team.role === role && !team.deleted);
  regTeamEl.innerHTML = '';
  if (!role) {
    regTeamEl.disabled = true;
    regTeamEl.innerHTML = '<option value="">请先选择业务线</option>';
    return;
  }
  if (!teams.length) {
    regTeamEl.disabled = true;
    regTeamEl.innerHTML = `<option value="">暂无${ROLE_LABELS[role] || '该业务线'}团队</option>`;
    return;
  }
  regTeamEl.disabled = false;
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '请选择所属团队';
  regTeamEl.appendChild(placeholder);
  teams.forEach(([teamId, team]) => {
    const opt = document.createElement('option');
    opt.value = teamId;
    opt.textContent = team.name || teamId;
    regTeamEl.appendChild(opt);
  });
}

async function loadRegisterTeams() {
  try {
    const r = await fetch('/api/config');
    const j = await r.json();
    registerTeams = (j && j.ok && j.config && j.config.teams) ? j.config.teams : {};
  } catch (e) {
    registerTeams = {
      ad_1: { name: '营销线1部', role: 'ad' },
      ad_2: { name: '营销线2部', role: 'ad' },
      ad_3: { name: '营销线3部', role: 'ad' },
      cs_1: { name: '客服销售线1部', role: 'cs' },
      cs_2: { name: '客服销售线2部', role: 'cs' },
      cs_3: { name: '客服销售线3部', role: 'cs' },
      store_1: { name: '长沙万达店', role: 'store' },
      store_2: { name: '上海静安店', role: 'store' },
      store_3: { name: '上海闵行店', role: 'store' },
      store_4: { name: '上海浦东店', role: 'store' },
    };
  }
  setTeamOptions(regRoleEl.value);
}

regRoleEl.addEventListener('change', () => {
  setTeamOptions(regRoleEl.value);
});

loadRegisterTeams();

function showRegError(msg) {
  regErrBox.textContent = msg;
  regErrBox.classList.remove('show');
  void regErrBox.offsetWidth;
  regErrBox.classList.add('show');
}
registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  regErrBox.classList.remove('show');
  const data = {
    realName: document.getElementById('r_realName').value.trim(),
    username: document.getElementById('r_username').value.trim(),
    password: document.getElementById('r_password').value,
    role: document.getElementById('r_role').value,
    teamId: document.getElementById('r_teamId').value.trim(),
    applyReason: document.getElementById('r_reason').value.trim(),
  };
  if (!data.realName || !data.username || !data.password || !data.role || !data.teamId) {
    showRegError('请填完所有必填项');
    return;
  }
  if (!/^[a-zA-Z0-9_\-]{3,32}$/.test(data.username)) {
    showRegError('用户名只能用 3-32 位字母/数字/_-');
    return;
  }
  if (data.password.length < 6) {
    showRegError('密码至少 6 位');
    return;
  }
  regBtn.disabled = true;
  regBtn.classList.add('loading');
  regBtnText.textContent = '提交中';
  try {
    const r = await fetch('/api/v6/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const j = await r.json();
    if (j.ok) {
      regBtnText.textContent = '已提交，等待审批';
      alert('✓ 申请已提交\n\n请等待总部审批通过后再登录。\n如有急事，请联系相关部门。');
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';
    } else {
      const errMap = {
        username_exists: '用户名已被占用',
        invalid_username: '用户名格式不对（3-32 位字母/数字/_-）',
        password_too_short: '密码至少 6 位',
        invalid_role: '岗位无效',
        invalid_team: '所选团队与业务线不匹配',
        missing_fields: '请填完所有必填项',
      };
      showRegError(errMap[j.error] || ('提交失败：' + (j.error || '未知')));
    }
  } catch (err) {
    showRegError('网络错误：' + err.message);
  } finally {
    regBtn.disabled = false;
    regBtn.classList.remove('loading');
    regBtnText.textContent = '提交申请';
  }
});

// 记住用户名（localStorage）
try {
  const saved = localStorage.getItem('sj_v6_username');
  if (saved) {
    usernameEl.value = saved;
    rememberEl.checked = true;
    // 用户名已填，自动 focus 密码
    setTimeout(() => passwordEl.focus(), 0);
  } else {
    usernameEl.focus();
  }
} catch(e) { usernameEl.focus(); }

function showError(msg) {
  errBox.textContent = msg;
  errBox.classList.remove('show');
  // reflow 重启动画
  void errBox.offsetWidth;
  errBox.classList.add('show');
}
function hideError() {
  errBox.classList.remove('show');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  const username = usernameEl.value.trim();
  const password = passwordEl.value;
  if (!username || !password) {
    showError('请输入用户名和密码');
    return;
  }
  btn.disabled = true;
  btn.classList.add('loading');
  btnText.textContent = '登录中';
  try {
    const r = await fetch('/api/v6/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const j = await r.json();
    if (j.ok) {
      // 记住用户名
      try {
        if (rememberEl.checked) {
          localStorage.setItem('sj_v6_username', username);
        } else {
          localStorage.removeItem('sj_v6_username');
        }
      } catch(e) {}
      btnText.textContent = '已登录，跳转中';
      window.location.href = '/';
    } else {
      showError(j.error === 'invalid' ? '用户名或密码错误' :
                j.error === 'disabled' ? '账号已停用，请联系管理员' :
                j.error === 'pending' ? '账号待审批，请等待总部审批，如有急事请联系相关部门' :
                '登录失败：' + (j.error || '未知错误'));
    }
  } catch (e) {
    showError('网络错误，请重试');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btnText.textContent = '登 录';
  }
});
</script>
</body>
</html>
